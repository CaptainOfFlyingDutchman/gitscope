name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and distribution
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv and Python 3.13
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install locked development environment
        run: uv sync --frozen --all-groups

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Type check
        run: uv run --frozen mypy gitscope scripts

      - name: Test
        run: uv run --frozen pytest

      - name: Build wheel and source distribution
        run: uv build

      - name: Verify distribution contents
        run: >-
          uv run --frozen python scripts/verify_wheel.py
          dist/*.whl --sdist dist/*.tar.gz

      - name: Install wheel in an isolated environment
        run: |
          uv venv .wheel-venv --python 3.13
          uv pip install --python .wheel-venv/bin/python dist/*.whl

      - name: Smoke test installed wheel
        run: >-
          uv run --frozen python scripts/smoke_test_wheel.py
          --executable .wheel-venv/bin/gitscope
          --report tests/fixtures/minimal-report.json
